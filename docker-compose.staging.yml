version: '3.8'

services:
  # Banco de dados PostgreSQL para staging
  db:
    image: postgres:15-alpine
    container_name: proteticflow_staging_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-proteticflow_staging}
      POSTGRES_USER: ${DB_USER:-postgres_staging}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-staging_password_123}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
      - ./backups:/backups
      - ./staging/test-data:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"  # Porta diferente para não conflitar com produção
    networks:
      - staging_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres_staging}"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Cache Redis para staging
  redis:
    image: redis:7-alpine
    container_name: proteticflow_staging_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-staging_redis_123}
    volumes:
      - redis_staging_data:/data
    ports:
      - "6380:6379"  # Porta diferente para não conflitar
    networks:
      - staging_network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Aplicação Django para staging
  web:
    build: 
      context: ./labmanager_source
      dockerfile: Dockerfile.staging
    container_name: proteticflow_staging_web
    restart: unless-stopped
    environment:
      - DEBUG=False
      - ENVIRONMENT=staging
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-proteticflow_staging}
      - DB_USER=${DB_USER:-postgres_staging}
      - DB_PASSWORD=${DB_PASSWORD:-staging_password_123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-staging_redis_123}@redis:6379/0
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-staging.proteticflow.com,localhost}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - POPULATE_TEST_DATA=${POPULATE_TEST_DATA:-True}
    volumes:
      - static_staging_volume:/app/staticfiles
      - media_staging_volume:/app/media
      - ./logs:/app/logs
      - ./staging/fixtures:/app/fixtures
    ports:
      - "8001:8000"  # Porta diferente para staging
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - staging_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Celery Worker para staging
  celery:
    build: 
      context: ./labmanager_source
      dockerfile: Dockerfile.staging
    container_name: proteticflow_staging_celery
    restart: unless-stopped
    command: celery -A labmanager worker --loglevel=debug
    environment:
      - DEBUG=False
      - ENVIRONMENT=staging
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-proteticflow_staging}
      - DB_USER=${DB_USER:-postgres_staging}
      - DB_PASSWORD=${DB_PASSWORD:-staging_password_123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-staging_redis_123}@redis:6379/0
    volumes:
      - media_staging_volume:/app/media
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
      - web
    networks:
      - staging_network

  # Celery Beat para staging
  celery-beat:
    build: 
      context: ./labmanager_source
      dockerfile: Dockerfile.staging
    container_name: proteticflow_staging_celery_beat
    restart: unless-stopped
    command: celery -A labmanager beat --loglevel=debug --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - DEBUG=False
      - ENVIRONMENT=staging
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-proteticflow_staging}
      - DB_USER=${DB_USER:-postgres_staging}
      - DB_PASSWORD=${DB_PASSWORD:-staging_password_123}
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://:${REDIS_PASSWORD:-staging_redis_123}@redis:6379/0
    volumes:
      - ./logs:/app/logs
    depends_on:
      - db
      - redis
      - web
    networks:
      - staging_network

  # Nginx para staging
  nginx:
    image: nginx:alpine
    container_name: proteticflow_staging_nginx
    restart: unless-stopped
    ports:
      - "8080:80"   # Porta diferente para staging
      - "8443:443"  # Porta diferente para staging
    volumes:
      - ./nginx/nginx.staging.conf:/etc/nginx/nginx.conf
      - ./nginx/sites-available/staging.conf:/etc/nginx/sites-available/default
      - ./nginx/ssl:/etc/nginx/ssl
      - static_staging_volume:/var/www/static
      - media_staging_volume:/var/www/media
      - ./frontend/labmanager-frontend/dist:/var/www/frontend
    depends_on:
      - web
    networks:
      - staging_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Selenium para testes automatizados
  selenium:
    image: selenium/standalone-chrome:latest
    container_name: proteticflow_selenium
    restart: unless-stopped
    ports:
      - "4444:4444"
      - "7900:7900"  # VNC para visualizar testes
    volumes:
      - /dev/shm:/dev/shm
    networks:
      - staging_network
    environment:
      - SE_VNC_NO_PASSWORD=1

  # MailHog para capturar emails de teste
  mailhog:
    image: mailhog/mailhog:latest
    container_name: proteticflow_mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    networks:
      - staging_network

  # Prometheus para monitoramento de staging
  prometheus:
    image: prom/prometheus:latest
    container_name: proteticflow_staging_prometheus
    restart: unless-stopped
    ports:
      - "9091:9090"  # Porta diferente
    volumes:
      - ./monitoring/prometheus.staging.yml:/etc/prometheus/prometheus.yml
      - prometheus_staging_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=72h'  # Menor retenção para staging
      - '--web.enable-lifecycle'
    networks:
      - staging_network

  # Grafana para staging
  grafana:
    image: grafana/grafana:latest
    container_name: proteticflow_staging_grafana
    restart: unless-stopped
    ports:
      - "3001:3000"  # Porta diferente
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-staging_grafana_123}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_staging_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - staging_network

volumes:
  postgres_staging_data:
    driver: local
  redis_staging_data:
    driver: local
  static_staging_volume:
    driver: local
  media_staging_volume:
    driver: local
  prometheus_staging_data:
    driver: local
  grafana_staging_data:
    driver: local

networks:
  staging_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

