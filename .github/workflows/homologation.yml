name: Homologation Workflow

on:
  push:
    branches: [ "main", "homologation", "staging", "dev", "feature/**" ]
  pull_request:
    branches: [ "main", "homologation", "staging", "dev" ]

jobs:
  Linter_SAST:
    name: Linter & SAST (ESLint + SonarCloud)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Frontend Dependencies
        working-directory: frontend/labmanager-frontend
        run: npm install

      - name: Run Linter (ESLint)
        working-directory: frontend/labmanager-frontend
        run: npm run lint

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  SCA_Secrets:
    name: SCA & Secrets (Snyk + GitLeaks)
    needs: Linter_SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Snyk to check for vulnerabilities
        uses: snyk/actions/python-3.10@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --file=labmanager_source/requirements.txt

  Build_DAST:
    name: Build & DAST (Docker + ZAP)
    needs: SCA_Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Start Staging Environment
        run: |
          cp .env.example .env
          docker-compose -f docker-compose.staging.yml up -d
          # Wait for services to be healthy
          sleep 60

      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.12.0
        with:
          target: 'http://localhost:8080'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true

  E2E:
    name: E2E Tests (Playwright)
    needs: Build_DAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r labmanager_source/requirements.staging.txt
          pip install pytest-playwright
          playwright install --with-deps chromium

      - name: Run Playwright tests
        run: |
          pytest tests/e2e/test_user_flows_playwright.py
        env:
          STAGING_BASE_URL: 'http://localhost:8080'
